name: Build Fabric Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Unzip source
        run: unzip OreESP-source.zip

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission
        run: chmod +x OreESP/gradlew

      - name: Build mod
        run: |
          cd OreESP
          ./gradlew build

      - name: Upload JAR
        uses: actions/upload-artifact@v3
        with:
          name: OreESP-mod
          path: OreESP/build/libs/oreESP-
